<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hitta närmaste städer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/sp38=" crossorigin=""></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(145deg, #fdf4f8 0%, #f5f0ff 100%);
      background-attachment: fixed;
      color: #2d1b2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #be185d;
      background: linear-gradient(135deg, #be185d, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 0.6rem;
      color: #7e6a80;
      font-size: 1rem;
      font-weight: 400;
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      width: 100%;
      max-width: 540px;
      margin-bottom: 2rem;
    }

    .search-box input {
      flex: 1;
      padding: 0.8rem 1.1rem;
      border: 2px solid #f9a8d4;
      border-radius: 50px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
      color: #2d1b2e;
    }

    .search-box input::placeholder {
      color: #c4a0bb;
    }

    .search-box input:focus {
      border-color: #ec4899;
      box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.32);
    }

    .search-box button {
      padding: 0.8rem 1.6rem;
      background: linear-gradient(135deg, #ec4899, #be185d);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      box-shadow: 0 4px 14px rgba(190, 24, 93, 0.3);
    }

    .search-box button:hover {
      opacity: 0.88;
    }

    .search-box button:active {
      transform: scale(0.97);
    }

    .search-box button:disabled {
      background: linear-gradient(135deg, #f9a8d4, #e879a0);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.7;
    }

    #radius-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      color: #7e6a80;
    }

    #radius-row input[type=range] {
      accent-color: #ec4899;
      cursor: pointer;
    }

    #radius-label {
      min-width: 5ch;
      font-weight: 600;
      color: #be185d;
    }

    #status {
      min-height: 1.5rem;
      font-size: 0.95rem;
      color: #9d7aaa;
      margin-bottom: 1rem;
      text-align: center;
    }

    #status.error {
      color: #9f1239;
    }

    #results {
      width: 100%;
      max-width: 600px;
    }

    .origin-card {
      background: linear-gradient(135deg, #fdf2f8, #f5eeff);
      border: 1px solid #f9a8d4;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      font-size: 0.95rem;
      color: #831843;
      box-shadow: 0 2px 10px rgba(190, 24, 93, 0.07);
    }

    .origin-card strong {
      display: block;
      font-size: 1.05rem;
      margin-bottom: 0.2rem;
    }

    .result-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .result-item {
      background: #fff;
      border: 1px solid #fce7f3;
      border-radius: 14px;
      padding: 0.9rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: box-shadow 0.18s, transform 0.15s;
      box-shadow: 0 1px 4px rgba(190, 24, 93, 0.06);
    }

    .result-item:hover {
      box-shadow: 0 4px 14px rgba(190, 24, 93, 0.12);
      transform: translateY(-1px);
    }

    .result-item .place-name {
      font-weight: 600;
      font-size: 1rem;
      color: #2d1b2e;
    }

    .result-item .place-type {
      font-size: 0.8rem;
      color: #9d7aaa;
      margin-top: 0.15rem;
    }

    .result-item .distance {
      font-size: 0.95rem;
      font-weight: 700;
      color: #be185d;
      white-space: nowrap;
      margin-left: 1rem;
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 1.7rem;
      height: 1.7rem;
      border-radius: 50%;
      background: linear-gradient(135deg, #fce7f3, #ede9fe);
      color: #be185d;
      font-size: 0.75rem;
      font-weight: 700;
      margin-right: 0.75rem;
      flex-shrink: 0;
    }

    .place-info {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .place-text {
      min-width: 0;
    }

    .place-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #b898bb;
      text-align: center;
    }

    footer a { color: #e879a0; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    #map {
      display: none;
      width: 100%;
      max-width: 600px;
      height: 400px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 20px rgba(190, 24, 93, 0.12);
      border: 1px solid #fce7f3;
    }

    .map-marker {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
    }

    .map-marker--origin {
      font-size: 1.4rem;
      background: none;
      box-shadow: none;
      width: 32px;
      height: 32px;
    }

    .map-marker--place {
      background: linear-gradient(135deg, #ec4899, #be185d);
      color: #fff;
    }

    .map-marker--landmark {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
    }

    .rank-badge--landmark {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      color: #92400e;
    }
  </style>
</head>
<body>
  <header>
    <h1>🗺️ Hitta närmaste städer</h1>
    <p>Ange en stad eller ort för att se de närmaste platserna runt om den.</p>
  </header>

  <form class="search-box" id="search-form" autocomplete="off">
    <input
      type="text"
      id="city-input"
      placeholder="Skriv en stad, t.ex. Stockholm…"
      aria-label="Stad eller ort"
      required
    />
    <button type="submit" id="search-btn">Sök</button>
  </form>

  <div id="radius-row">
    <label for="radius-slider">Sökradie:</label>
    <input
      type="range"
      id="radius-slider"
      min="10"
      max="200"
      step="10"
      value="50"
      aria-label="Sökradie i kilometer"
    />
    <span id="radius-label">50 km</span>
  </div>

  <div id="status" role="status" aria-live="polite"></div>

  <div id="map" aria-label="Karta över sökresultat"></div>

  <div id="results" aria-live="polite"></div>

  <footer>
    Data från <a href="https://www.openstreetmap.org" target="_blank" rel="noopener">OpenStreetMap</a>
    via <a href="https://nominatim.openstreetmap.org" target="_blank" rel="noopener">Nominatim</a>
    &amp; <a href="https://www.geonames.org" target="_blank" rel="noopener">GeoNames</a>.
  </footer>

  <script type="module">
    import {
      haversine,
      formatDistance,
      escapeHtml,
      PLACE_TYPE_LABELS,
      geocode,
      fetchNearby,
      processPlaces,
    } from './src/utils.js';

    const form = document.getElementById('search-form');
    const input = document.getElementById('city-input');
    const btn = document.getElementById('search-btn');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const radiusSlider = document.getElementById('radius-slider');
    const radiusLabel = document.getElementById('radius-label');

    let leafletMap = null;

    radiusSlider.addEventListener('input', () => {
      radiusLabel.textContent = `${radiusSlider.value} km`;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const city = input.value.trim();
      if (!city) return;
      await search(city);
    });

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = isError ? 'error' : '';
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btn.textContent = loading ? 'Söker…' : 'Sök';
    }

    function renderMap(originLat, originLon, originName, places) {
      const mapEl = document.getElementById('map');
      mapEl.style.display = 'block';

      if (leafletMap) {
        leafletMap.remove();
        leafletMap = null;
      }

      leafletMap = L.map('map');
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap contributors</a>',
        maxZoom: 19,
      }).addTo(leafletMap);

      // Origin marker
      const originIcon = L.divIcon({
        className: '',
        html: '<div class="map-marker map-marker--origin">📍</div>',
        iconSize: [32, 32],
        iconAnchor: [16, 16],
        popupAnchor: [0, -18],
      });
      L.marker([originLat, originLon], { icon: originIcon })
        .bindPopup(`<strong>${escapeHtml(originName)}</strong><br>Startpunkt`)
        .addTo(leafletMap);

      const bounds = [[originLat, originLon]];
      places.forEach((place, i) => {
        bounds.push([place.lat, place.lon]);
        const icon = L.divIcon({
          className: '',
          html: `<div class="map-marker map-marker--place">${i + 1}</div>`,
          iconSize: [28, 28],
          iconAnchor: [14, 14],
          popupAnchor: [0, -16],
        });
        const typeLabel = PLACE_TYPE_LABELS[place.type] || place.type || 'Ort';
        L.marker([place.lat, place.lon], { icon })
          .bindPopup(`<strong>${escapeHtml(place.name)}</strong><br>${escapeHtml(typeLabel)}<br>${formatDistance(place.dist)}`)
          .addTo(leafletMap);
      });

      leafletMap.fitBounds(bounds, { padding: [30, 30] });
    }

    async function search(cityName) {
      setLoading(true);
      setStatus('Letar upp koordinater…');
      resultsEl.innerHTML = '';

      // Hide and reset map while loading
      const mapEl = document.getElementById('map');
      mapEl.style.display = 'none';
      if (leafletMap) { leafletMap.remove(); leafletMap = null; }

      try {
        // Step 1: geocode the input city
        const origin = await geocode(cityName);
        const originLat = parseFloat(origin.lat);
        const originLon = parseFloat(origin.lon);
        const originDisplayName = origin.display_name.split(',')[0];

        // Step 2: fetch nearby cities via GeoNames cities dataset
        const radiusKm = parseInt(radiusSlider.value, 10);
        setStatus(`Hämtar städer inom ${radiusKm} km…`);
        const places = await fetchNearby(originLat, originLon, radiusKm);

        // Step 3: calculate distances, categorise, and sort
        const withDist = processPlaces(places, originLat, originLon, originDisplayName);

        if (!withDist.length) {
          setStatus(`Inga platser hittades inom ${radiusKm} km från "${originDisplayName}".`);
          setLoading(false);
          return;
        }

        setStatus(`Visar ${withDist.length} platser nära ${originDisplayName}`);

        // Render map
        renderMap(originLat, originLon, originDisplayName, withDist);

        // Render list
        const originCard = document.createElement('div');
        originCard.className = 'origin-card';
        originCard.innerHTML = `
          <strong>📍 ${escapeHtml(originDisplayName)}</strong>
          ${escapeHtml(origin.display_name.split(',').slice(1, 3).join(',').trim())}
        `;

        const list = document.createElement('ul');
        list.className = 'result-list';

        withDist.forEach((place, i) => {
          const li = document.createElement('li');
          li.className = 'result-item';
          const typeLabel = PLACE_TYPE_LABELS[place.type] || place.type || 'Ort';
          li.innerHTML = `
            <div class="place-info">
              <span class="rank-badge">${i + 1}</span>
              <div class="place-text">
                <div class="place-name">${escapeHtml(place.name)}</div>
                <div class="place-type">${escapeHtml(typeLabel)}</div>
              </div>
            </div>
            <span class="distance">${formatDistance(place.dist)}</span>
          `;
          list.appendChild(li);
        });

        resultsEl.appendChild(originCard);
        resultsEl.appendChild(list);

      } catch (err) {
        setStatus(err.message || 'Något gick fel. Försök igen.', true);
      } finally {
        setLoading(false);
      }
    }
  </script>
</body>
</html>
